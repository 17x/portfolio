name: Deploy to lucasischow.github.io

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: lucasischow-github-io
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAGES: "true"
      NEXT_PUBLIC_SITE_BASE_PATH: ""
      NEXT_PUBLIC_DEMO_BASE_URL: ${{ vars.NEXT_PUBLIC_DEMO_BASE_URL }}
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build static site
        run: npm run build

      - name: Checkout target Pages repository
        uses: actions/checkout@v4
        with:
          repository: lucasischow/lucasischow.github.io
          token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          path: target

      - name: Sync generated files into target repository
        run: rsync -av ./out/ ./target/

      - name: Commit and push target repository
        run: |
          cd target
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet && exit 0
          git commit -m "Deploy portfolio from source repo"
          git push
