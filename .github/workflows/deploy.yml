name: Deploy to lucasischow.github.io

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: lucasischow-github-io
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VITE_SITE_BASE_PATH: /
      VITE_DEMO_BASE_URL: ${{ vars.VITE_DEMO_BASE_URL }}
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Configure SSH deploy key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PAGES_DEPLOY_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - name: Deploy with gh-pages
        run: npm run deploy
